{{ define "main" }}
{{ $layout := default "preview" site.Params.links.layout }}
{{ $data := hugo.Data.recommend }}
<article class="sakura-page sakura-links-page sakura-links-page--{{ $layout }}">
  {{- partial "page-header.html" . -}}
  <div class="sakura-links-main">
    <div class="content sakura-page-content">
      <div class="links-preview links-preview--{{ $layout }}">
        {{ range $data.linkGroups }}
          {{ partial "links-preview-group.html" (dict "PageLayout" $layout "Group" .) }}
        {{ end }}
      </div>
    </div>
  </div>
</article>
{{ end }}
